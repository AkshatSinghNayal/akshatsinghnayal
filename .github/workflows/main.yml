name: Generate Pac-Man Game

on:
  schedule:
    # Runs automatically every 24 hours
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows you to manually run it anytime
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        # Note: If abozanona updates their action to a specific v2/v3 tag, 
        # you can lock it here, but @main pulls their latest live code.

      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        # UPGRADED: Changed from v3.1.0 to v4 to fully support Node 24
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
